spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:energycommunity}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USER:disysuser}
spring.datasource.password=${DB_PASSWORD:disyspw}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.rabbitmq.listener.simple.auto-startup=true
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=disysuser
spring.rabbitmq.password=disyspw
server.port=8083
