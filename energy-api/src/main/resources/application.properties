spring.application.name=energy-api
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:energycommunity}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USER:disysuser}
spring.datasource.password=${DB_PASSWORD:disyspw}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
server.port=8080
